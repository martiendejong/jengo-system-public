# Pattern: Pre-Implementation Verification Gate
# Prevent wasted work by verifying task is actually needed
#
# Discovery: 88x ROI pattern (19% of tasks already complete)

pattern:
  name: "Pre-Implementation Verification"
  category: Quality Gate
  roi: 88x  # Measured across 100+ tasks
  time_cost: "2-5 minutes"
  time_saved: "2-8 hours per false-positive task"

problem:
  description: |
    Task management systems can drift from code reality:
    - Feature already implemented but task still marked TODO
    - Requirement already satisfied by different approach
    - Task refined based on old codebase state

    Implementing without verification wastes hours.

solution:
  verification_protocol:
    steps:
      1:
        action: "Read task description + acceptance criteria"
        extract: "List of required files/features/behaviors"

      2:
        action: "Search codebase for evidence of implementation"
        methods:
          - "Glob for expected files"
          - "Grep for key function names/classes"
          - "Check for related PRs (gh pr list --search)"

      3:
        action: "Verify each requirement"
        for_each_requirement:
          - check: "Does code exist?"
          - check: "Does it match acceptance criteria?"
          - check: "Is it tested?"

      4:
        action: "Classify task state"
        outcomes:
          100_percent_complete:
            action: "Post comment with evidence, move to TESTING"
            example: "All 5 requirements verified in codebase. PR #123 implemented this."

          partially_complete:
            action: "Post comment listing what exists vs what's needed"
            example: "3/5 features exist. Still need: X, Y."

          not_started:
            action: "Proceed with implementation"

evidence_requirements:
  - "File paths with line numbers"
  - "Function/class names that satisfy requirements"
  - "PR numbers if applicable"
  - "Test coverage evidence"

behavioral_tests:
  - scenario: "Task says 'Add email validation'"
    verification: "Grep for email validation logic, check if exists"
    if_found: "Don't re-implement, verify and mark complete"

  - scenario: "Task says 'Create UserService'"
    verification: "Glob for UserService.*, check implementation"
    if_found: "Compare with acceptance criteria, only implement gaps"

roi_calculation:
  time_to_verify: "2-5 minutes (file search + grep + PR check)"
  time_saved_per_hit: "2-8 hours (full implementation cycle)"
  hit_rate: "19% across 100+ tasks"
  expected_roi: "88x (measured), conservative estimate 50x"

integration:
  task_workflow: "Run verification BEFORE allocating worktree"
  prevents: "Wasted development time, duplicate implementations, git conflicts"
